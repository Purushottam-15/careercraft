<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCraft - Home</title>
    <link rel="stylesheet" href="home-style.css">
    <link rel="stylesheet" href="footer/footer.css">
</head>

<body>
    <section class="hero-banner-section">
        <div class="hero-content">
            <h1>Take charge of <br>your career</h1>
            <p class="hero-subtitle-new">
                Find the right opportunities, build in-demand skills, and advance your professional journey with confidence.
            </p>
            <div class="hero-search-bar">
                <div class="search-input-group">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" placeholder="Job title or keywords" class="search-input">
                </div>
                <div class="search-divider"></div>
                <div class="search-input-group">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <input type="text" placeholder="Location" class="search-input">
                </div>
                <button class="hero-search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
        </div>
    </section>

    

    <section class="features-section">
        <h2 style="font-size: 2rem; color: #0f172a; margin-bottom: 2rem; font-weight: 700;">Explore our services</h2>
        <div class="feature-row">
            <div class="feature-card">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                </div>
                <div class="feature-content">
                    <h3>Prepare for a job role</h3>
                    <span class="arrow">></span>
                </div>
            </div>

            <div class="feature-card" onclick="if(window.handleResumeGenerationNav) window.handleResumeGenerationNav(event)" style="cursor: pointer;">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <div class="feature-content">
                    <h3>Generate resume</h3>
                    <span class="arrow">></span>
                </div>
            </div>

            <div class="feature-card" onclick="if(window.showRoadmap) window.showRoadmap(event)" style="cursor: pointer;">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6l6-3 6 3 6-3v12l-6 3-6-3-6 3V6z"></path>
                        <path d="M9 3v15"></path>
                        <path d="M15 6v15"></path>
                    </svg>
                </div>
                <div class="feature-content" id="roadmap">
                    <h3>Roadmap</h3>
                    <span class="arrow">></span>
                </div>
            </div>
        </div>

        <div class="feature-row">
            <div class="feature-card" onclick="if(window.showQuiz) window.showQuiz()" style="cursor: pointer;">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5z"></path>
                        <polyline points="17 3 17 8 22 8"></polyline>
                    </svg>
                </div>
                <div class="feature-content" id="quiz">
                    <h3>Take Quiz</h3>
                    <span class="arrow">></span>
                </div>
            </div>

            <div class="feature-card" onclick="if(window.showHackathons) window.showHackathons(event)" style="cursor: pointer;">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </div>
                <div class="feature-content" id="hackathons">
                    <h3>Contests & Hackathons</h3>
                    <span class="arrow">></span>
                </div>
            </div>

            <div class="feature-card" onclick="if(window.showInternships) window.showInternships(event)" style="cursor: pointer;">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                    </svg>
                </div>
                <div class="feature-content" id="internships">
                    <h3>Find Internships</h3>
                    <span class="arrow">></span>
                </div>
            </div>
        </div>
    </section>

    <!-- Trusted Companies Carousel -->
    <div class="trusted-companies">
        <p class="trusted-label">Trusted by</p>
        <div class="carousel-container">
            <div class="carousel-track">
                <!-- Logos -->
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/9/96/Microsoft_logo_%282012%29.svg" alt="Microsoft"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" alt="Meta"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Adobe_Systems_logo_and_wordmark.svg" alt="Adobe"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/Salesforce.com_logo.svg" alt="Salesforce"></div>
                <div class="carousel-logo"><img src="https://cdn.worldvectorlogo.com/logos/tata-consultancy-services.svg" alt="TCS" style="transform: scale(1.5);"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a0/Wipro_Primary_Logo_Color_RGB.svg" alt="Wipro"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Infosys_logo.svg" alt="Infosys"></div>

                <!-- Duplicated for infinite scroll effect -->
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/9/96/Microsoft_logo_%282012%29.svg" alt="Microsoft"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" alt="Meta"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Adobe_Systems_logo_and_wordmark.svg" alt="Adobe"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/Salesforce.com_logo.svg" alt="Salesforce"></div>
                <div class="carousel-logo"><img src="https://cdn.worldvectorlogo.com/logos/tata-consultancy-services.svg" alt="TCS" style="transform: scale(1.5);"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a0/Wipro_Primary_Logo_Color_RGB.svg" alt="Wipro"></div>
                <div class="carousel-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Infosys_logo.svg" alt="Infosys"></div>
            </div>
        </div>
    </div>
    
</body>

</html>
